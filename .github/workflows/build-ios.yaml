name: build-ios

on:
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.44.4'

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.BOARD_SDK_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_26.3.app || sudo xcode-select -s /Applications/Xcode_26.2.app
          xcodebuild -version

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup Code Signing
        run: |
          # 创建专用钥匙串
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain

          # 导入 Distribution 证书（带私钥）
          echo "${{ secrets.IOS_CERTIFICATE }}" | base64 --decode > cert.p12
          security import cert.p12 -k build.keychain \
            -P "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: -s -k temp build.keychain

          # 安装描述文件（UUID 命名）
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          for data in "${{ secrets.IOS_PROVISIONING_PROFILE }}" "${{ secrets.IOS_PACKETTUNNEL_PROFILE }}"; do
            echo "$data" | base64 --decode > profile.mobileprovision
            UUID=$(plutil -extract UUID raw -o - profile.mobileprovision 2>/dev/null) || \
            UUID=$(grep -aA1 '<key>UUID</key>' profile.mobileprovision | \
              tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
            [ -n "$UUID" ] && cp profile.mobileprovision \
              ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          done

          # API 密钥（上传 TestFlight 用）
          mkdir -p ~/private_keys
          echo "${{ secrets.ASC_API_KEY }}" > ~/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Build iOS
        run: |
          make core-ios
          flutter precache --ios

          cd ios && pod install && cd ..
          test -d ios/Runner.xcworkspace || { echo "ERROR: pod install 未生成 Runner.xcworkspace"; exit 1; }

          # Archive（Manual 签名 — 使用已安装的描述文件）
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            archive

          # 导出 IPA
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>9ZKNBU3VL4</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath dist/ \
            -exportOptionsPlist ExportOptions.plist

          # 重命名 IPA
          mv dist/Runner.ipa dist/FlClash-ios-arm64.ipa 2>/dev/null || \
          mv dist/fl_clash.ipa dist/FlClash-ios-arm64.ipa 2>/dev/null || \
          { ls -la dist/; echo "ERROR: 找不到 IPA"; exit 1; }

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app -f dist/FlClash-ios-arm64.ipa \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }} \
            --type ios

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlClash-ios
          path: ./dist/FlClash-ios-arm64.ipa
          overwrite: true
